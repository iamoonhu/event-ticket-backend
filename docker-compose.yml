services:
  db:
    image: mysql:latest
    ports:
      - "3307:3306"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "R9v#K2m@L7q!X4t$"
      MYSQL_DATABASE: tickets

  # Database management interface
  adminer:
    image: adminer:latest
    restart: always
    ports:
      - 8888:8080

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: ${KADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KPASS}
    volumes:
      - keycloak-data:/opt/keycloak/data
    command:
      - start-dev --http-port=9090
      - --db=dev-file

volumes:
  keycloak-data:
    driver: local